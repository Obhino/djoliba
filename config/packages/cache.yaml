framework:
    cache:
        # Unique name of your app: used to compute stable namespaces for cache keys.
        #prefix_seed: your_vendor_name/app_name

        # Pool principal de l'application : Redis en prod, système de fichiers en dev si Redis absent
        app: cache.adapter.redis
        default_redis_provider: '%env(REDIS_URL)%'

        # APCu (alternative si Redis non disponible)
        #app: cache.adapter.apcu

when@test:
    framework:
        cache:
            app: cache.adapter.array  # Cache en mémoire pour les tests (pas de Redis nécessaire)
