framework:
    messenger:
        failure_transport: failed

        transports:
            async: '%env(MESSENGER_TRANSPORT_DSN)%'
            failed: '%env(MESSENGER_TRANSPORT_DSN)%?queue_name=failed'
            sync: 'sync://'

        routing:
            # On route les futurs messages vers le transport asynchrone
            'App\Message\ProcessDocumentMessage': async
            'App\Message\ExportProjectMessage': async
            'Symfony\Component\Mailer\Messenger\SendEmailMessage': async

when@test:
    framework:
        messenger:
            transports:
                async: 'in-memory://'
