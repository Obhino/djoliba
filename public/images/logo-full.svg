<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <defs>
    <linearGradient id="djoliba-green-grad-full" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
  </defs>

  <!-- Icône Emblem D (Centrée en haut) -->
  <g transform="translate(150, 20) scale(1)">
    <!-- Barre verticale bleue marine -->
    <rect x="195" y="100" width="105" height="220" rx="6" fill="#0F2942" />

    <!-- Vagues vertes -->
    <path d="M 195 45 C 340 45 510 95 510 210 C 510 325 340 375 195 375" stroke="url(#djoliba-green-grad-full)" stroke-width="34" stroke-linecap="round" fill="none" />
    <path d="M 195 95 C 315 95 465 135 465 210 C 465 285 315 325 195 325" stroke="url(#djoliba-green-grad-full)" stroke-width="24" stroke-linecap="round" fill="none" />
    <path d="M 195 145 C 290 145 420 175 420 210 C 420 245 290 275 195 275" stroke="url(#djoliba-green-grad-full)" stroke-width="16" stroke-linecap="round" fill="none" />

    <!-- Nœuds -->
    <line x1="490" y1="120" x2="545" y2="210" stroke="#10B981" stroke-width="16" stroke-linecap="round" />
    <line x1="545" y1="210" x2="490" y2="300" stroke="#10B981" stroke-width="16" stroke-linecap="round" />
    <line x1="490" y1="120" x2="490" y2="300" stroke="#10B981" stroke-width="16" stroke-linecap="round" />

    <circle cx="490" cy="120" r="28" fill="#10B981" />
    <circle cx="545" cy="210" r="28" fill="#10B981" />
    <circle cx="490" cy="300" r="28" fill="#10B981" />
  </g>

  <!-- Texte DJOLIBA Search -->
  <text x="400" y="470" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="900" letter-spacing="2">
    <tspan fill="#0F2942">DJOLIBA </tspan>
    <tspan fill="#10B981" font-weight="600">Search</tspan>
  </text>

  <!-- Slogan -->
  <text x="400" y="525" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="500" fill="#475569" letter-spacing="0.5">
    La 1ère plateforme autonome de recherche scientifique en Afrique
  </text>
</svg>
